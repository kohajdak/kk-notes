# .github/workflows/backend-ci.yml
name: Backend CI and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

env:
  NODE_ENV: test
  TEST_DB_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
  TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
  TEST_DB_DBNAME: ${{ secrets.TEST_DB_DBNAME }}

jobs:
  test-and-migrate:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ env.TEST_DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ env.TEST_DB_PASSWORD }}
          POSTGRES_DB: ${{ env.TEST_DB_DBNAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -q -h localhost -p 5432"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=postgres://${{ env.TEST_DB_USERNAME }}:${{ env.TEST_DB_PASSWORD }}@localhost:5432/${{ env.TEST_DB_DBNAME }}" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npx eslint .

      - name: Debug Postgres service
        run: docker ps -a

      - name: Wait for Postgres
        run: |
          export PGPASSWORD="${{ secrets.TEST_DB_PASSWORD }}"
          for i in {1..60}; do
            if pg_isready -h localhost -p 5432 -U ${{ env.TEST_DB_USERNAME }} -d ${{ env.TEST_DB_DBNAME }}; then
              echo "Postgres is ready!"
              exit 0
            fi
            echo "Waiting for Postgres... ($i/10)"
            sleep 5
          done
          echo "Postgres did not become ready in time."
          exit 1

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PGPASSWORD: ${{ env.TEST_DB_PASSWORD }}
        run: npx sequelize-cli db:migrate --env test --url "$DATABASE_URL"

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PGPASSWORD: ${{ env.TEST_DB_PASSWORD }}
        run: npm test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

      - name: Build Docker image for backend
        working-directory: backend
        run: docker build -t backend:ci .

      - name: Save Docker image to tar
        working-directory: backend
        run: docker save backend:ci -o backend-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend/backend-image.tar
