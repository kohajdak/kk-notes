name: Backend CI and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  test-and-migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: notes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d notes_test"
          --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://app:secret@127.0.0.1:5432/notes_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: |
          npm run lint || true

      - name: Wait for Postgres
        run: |
          for i in {1..15}; do
            pg_isready -h 127.0.0.1 -p 5432 -U app && break
            sleep 1
          done

      - name: Run migrations
        working-directory: backend
        run: npx sequelize-cli db:migrate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run tests with coverage
        working-directory: backend
        run: |
          npm test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

      - name: Build Docker image for backend
        working-directory: backend
        run: |
          docker build -t backend:ci .

      - name: Save Docker image to tar
        working-directory: backend
        run: |
          docker save backend:ci -o backend-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend/backend-image.tar

  deploy:
    needs: test-and-migrate
    runs-on: ubuntu-latest
    # Deployment can only be triggered manually from the Actions UI. It can be switched to automatic later if the deploy environment secrets are available.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    env:
      PROD_DB: ${{ secrets.PROD_DB }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Optional production migrations
        if: ${{ env.PROD_DB == 'true' }}
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          echo "Running production migrations (enabled)"
          export DATABASE_URL="${PROD_DATABASE_URL}"
          cd backend && npx sequelize-cli db:migrate

      # If no deploy secrets provided, upload artifact as simulated deploy
      - name: Upload build artifact (simulate deploy)
        if: ${{ env.DEPLOY_HOST == '' || env.DEPLOY_USER == '' || env.DEPLOY_PATH == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/

      # If deploy secrets are present, perform real rsync+ssh deploy
      - name: Add server to known_hosts
        if: ${{ env.DEPLOY_HOST != '' }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Setup SSH agent
        if: ${{ env.DEPLOY_HOST != '' }}
        uses: webfactory/ssh-agent@v0.8.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Rsync backend to server and restart
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_PATH != '' }}
        run: |
          rsync -avz --delete --exclude node_modules --exclude .git ./backend/ ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} "cd ${DEPLOY_PATH} && npm ci --production && pm2 restart kk-notes || pm2 start backend/index.js --name kk-notes"
