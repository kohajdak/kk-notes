name: Backend CI and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  test-and-migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          POSTGRES_DB: notes_test
        # ports: nem szükséges a GitHub Actions services esetén
        options: >-
          --health-cmd "pg_isready -U app -d notes_test"
          --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      NODE_ENV: test
      # explicit a service host; lehet localhost vagy postgres
      DATABASE_URL: postgres://app:${{ secrets.TEST_DB_PASSWORD }}@postgres:5432/notes_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npx eslint .

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h postgres -p 5432 -U app -d notes_test; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Run migrations
        working-directory: backend
        run: npx sequelize-cli db:migrate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run tests with coverage
        working-directory: backend
        run: npm test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

      - name: Build Docker image for backend
        working-directory: backend
        run: docker build -t backend:ci .

      - name: Save Docker image to tar
        working-directory: backend
        run: docker save backend:ci -o backend-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend/backend-image.tar
